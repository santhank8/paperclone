appId: com.paperclipai.app
productName: Paperclip
copyright: Copyright © 2025 Paperclip AI

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - package.json

# Bundle the built server + UI alongside the app
extraResources:
  - from: ../server/dist
    to: app-server/server/dist
    filter:
      - "**/*"
  - from: ../server/ui-dist
    to: app-server/server/ui-dist
    filter:
      - "**/*"
  - from: ../server/node_modules
    to: app-server/server/node_modules
    filter:
      - "**/*"
  - from: ../server/package.json
    to: app-server/server/package.json
  - from: ../packages
    to: app-server/packages
    filter:
      - "**/dist/**"
      - "**/package.json"

# ─── macOS ───────────────────────────────────────────────────────────────────

mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - x64        # Intel Macs
        - arm64      # Apple Silicon
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ─── Windows ─────────────────────────────────────────────────────────────────

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico

# ─── Linux (bonus) ──────────────────────────────────────────────────────────

linux:
  icon: assets/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

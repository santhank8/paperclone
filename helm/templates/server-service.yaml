apiVersion: v1
kind: Service
metadata:
  name: {{ include "paperclip.fullname" . }}-server
  labels:
    {{- include "paperclip.server.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "paperclip.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server

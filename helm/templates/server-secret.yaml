apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}-server
  labels:
    {{- include "paperclip.server.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "paperclip.databaseUrl" . | quote }}
  better-auth-secret: {{ .Values.server.secrets.betterAuthSecret | quote }}
  {{- if .Values.server.paperclip.openaiApiKey }}
  openai-api-key: {{ .Values.server.paperclip.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.server.paperclip.anthropicApiKey }}
  anthropic-api-key: {{ .Values.server.paperclip.anthropicApiKey | quote }}
  {{- end }}

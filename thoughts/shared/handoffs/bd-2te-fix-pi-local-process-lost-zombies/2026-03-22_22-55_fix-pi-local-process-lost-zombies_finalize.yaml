final_solutions:
  - "Bug 1 (immortal zombies): Coalescing now checks isZombieRun() before merging wakeups into existing runs. Zombie runs (running in DB, no live process) are skipped, so updatedAt stops refreshing and the periodic reaper can catch them."
  - "Bug 2 (silent startup reap): Changed void fire-and-forget to await with retry (max 2 attempts). Startup reap now completes before setInterval timer starts. Logs reaped count."
  - "Bug 3 (maxConcurrentRuns blocking): Fixed by Bugs 1+2 — zombies get reaped, freeing the concurrency slot for new runs."
  - "Bug 4 (pi_local UI): pi_local added to isLocal gate — model dropdown, cwd, thinking effort, command placeholder all visible."

final_decisions:
  - "Extracted isZombieRun and filterZombieCoalesceTarget as pure exported functions (follows existing shouldResetTaskSessionForWake pattern)"
  - "No periodic reaper code changes needed — existing staleness logic works once coalescing stops refreshing updatedAt on zombies"
  - "Preserved upstream resumeQueuedRuns() during rebase — called after startup reap completes"

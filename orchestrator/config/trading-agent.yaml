# Agentic Squad — project configuration for trading-agent
# Loaded by Scrum Master at startup. See AgenticSquad_Functional_Spec §6.2, §13.4

project:
  name: trading-agent
  repo: stepan-korec/trading-agent
  default_branch: main

execution:
  backend: vps             # vps (default) or azure
  max_parallel: 1          # Sequential by default. Set to 3 for parallel.
  max_retries: 3
  job_timeout_seconds: 1800
  azure_job_name: caj-claude-code-runner
  vps_runner_image: trading-agent-workforce-claude-code-runner:latest
  vps_docker_socket: /var/run/docker.sock
  vps_network: trading-agent
  branch_prefix: feat/issue-
  runner_max_turns: 50

cost_control:
  monthly_budget_usd: 50.0
  per_story_alert_usd: 2.0
  alert_thresholds: [0.5, 0.8, 0.95]
  hard_stop_at_budget: true
  claude_sonnet_input_per_mtok: 3.0
  claude_sonnet_output_per_mtok: 15.0

smoke_test:
  enabled: true
  story:
    title: "[SMOKE] Update README timestamp"
    body: "Add current UTC timestamp to the bottom of README.md under a '## Last Smoke Test' section."
    labels: ["smoke-test"]

name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Ironworks VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy via SSH
        # Pinned to v1.2.0 — update SHA when upgrading the action version
        uses: appleboy/ssh-action@2d048bfd40d77e0ad0b38e3c1bb1af0658cbe29b
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /home/deploy/ironworks

            echo "==> Pulling latest from master..."
            git fetch origin master
            git reset --hard origin/master

            echo "==> Rebuilding Docker image..."
            sudo docker compose -f docker-compose.production.yml build --no-cache

            echo "==> Restarting container..."
            sudo docker compose -f docker-compose.production.yml down
            sudo docker compose -f docker-compose.production.yml up -d

            echo "==> Pruning old images..."
            sudo docker image prune -f

            echo "==> Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3100/api/health > /dev/null 2>&1; then
                echo "==> Ironworks is healthy!"
                exit 0
              fi
              sleep 2
            done

            echo "==> WARNING: Health check timed out after 60s"
            sudo docker compose -f docker-compose.production.yml logs --tail=50
            exit 1

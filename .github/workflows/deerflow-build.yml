name: Build & Publish DeerFlow Image

on:
  push:
    branches: [master]
    paths:
      - 'deerflow/**'
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deerflow-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── DeerFlow backend tests ────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install and test DeerFlow backend
        run: cd deerflow/backend && uv sync && uv run pytest tests/ -v --tb=short

  # ── Security scan on Dockerfile before building ────────────────────
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Scan Dockerfile with Trivy (misconfig)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scanners: misconfig
          scan-ref: deerflow/backend/Dockerfile
          severity: HIGH,CRITICAL
          exit-code: 1

  # ── Build and push DeerFlow image ──────────────────────────────────
  build:
    needs: [test, scan]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/paperclip-deerflow
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: ./deerflow
          file: ./deerflow/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=deerflow
          cache-to: type=gha,scope=deerflow,mode=max
          platforms: linux/amd64

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/paperclip-deerflow:${{ steps.meta.outputs.version }}
          severity: CRITICAL
          exit-code: 1
          format: table
          ignore-unfixed: true

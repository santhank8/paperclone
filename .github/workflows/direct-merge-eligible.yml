name: Direct merge eligible

on:
  workflow_run:
    workflows:
      - PR
    types:
      - completed

jobs:
  maybe-auto-merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge PR when body contains <!-- direct_merge_eligible --> marker
        env:
          GH_TOKEN: ${{ github.token }}
          PR_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          set -euo pipefail
          pr_json="${PR_JSON}"
          count="$(printf '%s' "$pr_json" | jq 'length')"
          if [ "$count" -eq 0 ]; then
            echo "No pull_requests on workflow_run; skipping."
            exit 0
          fi
          pr_number="$(printf '%s' "$pr_json" | jq -r '.[0].number')"
          repo="${{ github.repository }}"

          pr_view_json="$(gh pr view "$pr_number" --repo "$repo" --json body,baseRefName,isDraft)"
          body="$(printf '%s' "$pr_view_json" | jq -r .body)"
          base="$(printf '%s' "$pr_view_json" | jq -r .baseRefName)"
          draft="$(printf '%s' "$pr_view_json" | jq -r .isDraft)"

          marker='<!-- direct_merge_eligible -->'
          body_lc="$(printf '%s' "$body" | tr '[:upper:]' '[:lower:]')"
          case "$body_lc" in *"$marker"*) ;; *)
            echo "PR body does not contain <!-- direct_merge_eligible --> (case-insensitive); skipping."
            exit 0
            ;; esac

          if [ "$base" != "master" ]; then
            echo "Base ref is $base (expected master); skipping."
            exit 0
          fi

          if [ "$draft" = "true" ]; then
            echo "PR is draft; skipping."
            exit 0
          fi

          echo "Enabling auto-merge (squash) for PR #$pr_number"
          gh pr merge "$pr_number" --repo "$repo" --auto --squash

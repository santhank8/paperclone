name: PR Policy

on:
  pull_request:
    branches:
      - master

concurrency:
  group: pr-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Block manual lockfile edits
        if: github.head_ref != 'chore/refresh-lockfile'
        run: |
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          if printf '%s\n' "$changed" | grep -qx 'pnpm-lock.yaml'; then
            echo "Do not commit pnpm-lock.yaml in pull requests. CI owns lockfile updates."
            exit 1
          fi

      - name: Classify PR risk tier
        id: risk
        run: |
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"

          HIGH_RISK_PATTERNS='server/src/routes/auth|server/src/services/auth|server/src/routes/access|server/src/services/access|server/src/routes/authz|server/src/routes/companies|server/src/services/companies|server/src/services/approval|server/src/routes/approvals|server/src/services/budget|server/src/services/costs|server/src/routes/costs|server/src/routes/issues-checkout|server/src/services/issues|packages/db/src/schema|packages/db/src/migrations|\.github/workflows|\.env'

          if printf '%s\n' "$changed" | grep -Eq "$HIGH_RISK_PATTERNS"; then
            echo "tier=high" >> "$GITHUB_OUTPUT"
            echo "::warning::PR classified as HIGH RISK — elevated review required"
          elif printf '%s\n' "$changed" | grep -Eq 'server/src/|packages/shared|packages/adapters|ui/src/'; then
            echo "tier=medium" >> "$GITHUB_OUTPUT"
            echo "::notice::PR classified as MEDIUM RISK"
          else
            echo "tier=low" >> "$GITHUB_OUTPUT"
            echo "::notice::PR classified as LOW RISK — fast lane eligible"
          fi

      - name: Check PR evidence sections
        if: steps.risk.outputs.tier == 'high' || steps.risk.outputs.tier == 'medium'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q .body 2>/dev/null || echo "")
          if [ -n "$BODY" ]; then
            echo "$BODY" | node scripts/check-pr-evidence.mjs || echo "::warning::PR evidence sections incomplete — see doc/AGENT_PR_CONTRACT.md"
          fi

      - name: Validate dependency resolution when manifests change
        run: |
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          manifest_pattern='(^|/)package\.json$|^pnpm-workspace\.yaml$|^\.npmrc$|^pnpmfile\.(cjs|js|mjs)$'
          if printf '%s\n' "$changed" | grep -Eq "$manifest_pattern"; then
            pnpm install --lockfile-only --ignore-scripts --no-frozen-lockfile
          fi

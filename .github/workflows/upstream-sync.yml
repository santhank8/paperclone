name: Upstream Sync

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync from paperclipai/paperclip
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Check for existing sync PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync/upstream-$(date -u +%Y-%m-%d)"
          EXISTING=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --state all \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Sync PR #$EXISTING already exists for today — skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch upstream
        if: steps.check_pr.outputs.exists == 'false'
        run: |
          git remote add upstream https://github.com/paperclipai/paperclip.git
          git fetch upstream master

      - name: Check for new upstream commits
        id: check_commits
        if: steps.check_pr.outputs.exists == 'false'
        run: |
          NEW_COMMITS=$(git rev-list HEAD..upstream/master --count)
          echo "new_commits=$NEW_COMMITS" >> "$GITHUB_OUTPUT"
          if [ "$NEW_COMMITS" -eq 0 ]; then
            echo "No new upstream commits — nothing to sync."
          else
            echo "$NEW_COMMITS new upstream commit(s) found."
          fi

      - name: Create sync branch and attempt merge
        id: merge
        if: steps.check_pr.outputs.exists == 'false' && steps.check_commits.outputs.new_commits != '0'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          BRANCH="sync/upstream-$TODAY"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          # Collect upstream commit list (capped at 50)
          git log HEAD..upstream/master --oneline --no-merges | head -50 > /tmp/commit_log.txt
          echo "Upstream commits to merge:"
          cat /tmp/commit_log.txt

          if git merge upstream/master --no-edit; then
            echo "merge_clean=true" >> "$GITHUB_OUTPUT"
            echo "Merge succeeded cleanly."
          else
            echo "merge_clean=false" >> "$GITHUB_OUTPUT"
            git diff --name-only --diff-filter=U > /tmp/conflicted_files.txt
            echo "Merge conflicts detected:"
            cat /tmp/conflicted_files.txt
            # Commit conflict markers so the branch can be pushed
            git add -A
            git commit --no-edit -m "chore: sync upstream paperclip $TODAY [conflicts]" || true
          fi

          git push origin "$BRANCH"

      - name: Create PR (clean merge)
        if: steps.merge.outputs.merge_clean == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_LOG=$(cat /tmp/commit_log.txt)
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base master \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "chore: sync upstream paperclip (${{ steps.date.outputs.today }})" \
            --body "## Upstream sync — ${{ steps.date.outputs.today }}

Automated daily sync from [paperclipai/paperclip](https://github.com/paperclipai/paperclip).

### Upstream commits included

\`\`\`
${COMMIT_LOG}
\`\`\`

---
*Merged cleanly. Review and merge when ready — branch protection still applies.*" \
            --assignee kaylenmistry

      - name: Create PR (conflicts)
        if: steps.merge.outputs.merge_clean == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_LOG=$(cat /tmp/commit_log.txt)
          CONFLICTED=$(cat /tmp/conflicted_files.txt)
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base master \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "chore: sync upstream paperclip (${{ steps.date.outputs.today }}) [CONFLICTS]" \
            --body "## Upstream sync — ${{ steps.date.outputs.today }} — Merge conflicts

Automated daily sync from [paperclipai/paperclip](https://github.com/paperclipai/paperclip).

### Upstream commits included

\`\`\`
${COMMIT_LOG}
\`\`\`

### Conflicting files

\`\`\`
${CONFLICTED}
\`\`\`

---
*Manual resolution required. Assign to CTO + engineer to resolve conflicts before merging.*" \
            --label conflicts \
            --assignee kaylenmistry

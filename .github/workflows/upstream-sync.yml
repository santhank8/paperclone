name: Upstream Sync

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/paperclipai/paperclip.git || true
          git fetch upstream master

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/master)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream."
          else
            echo "Upstream has $BEHIND new commit(s)."
          fi

      - name: Create sync branch and PR
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/upstream-sync-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git merge upstream/master --no-edit || true

          # If there are conflicts, commit the merge state so the PR shows them
          if git diff --name-only --diff-filter=U | head -1 | grep -q .; then
            git add -A
            git commit --no-edit -m "chore: merge upstream/master (conflicts need manual resolution)" || true
          fi

          git push origin "$BRANCH"

          # Create PR if one doesn't already exist for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "chore: sync upstream paperclip ($(date +%Y-%m-%d))" \
              --body "$(cat <<'EOF'
          ## Upstream Sync

          Automated merge of `paperclipai/paperclip:master` into our fork.

          **Review checklist:**
          - [ ] Check for conflicts in branding files (see FORK.md for hotspot list)
          - [ ] Verify `docker compose build` succeeds
          - [ ] Verify `docker compose up -d` boots cleanly
          - [ ] Spot-check UI for any new "Paperclip" strings that need rebranding
          EOF
          )" \
              --label "upstream-sync" || true
          fi

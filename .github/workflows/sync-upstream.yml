name: Sync with Upstream

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync fork with upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        # UPSTREAM_URL must be set as a repo variable (not secret) in GitHub → Settings → Variables
        # e.g. https://github.com/nearai/ironclaw
        run: |
          UPSTREAM="${{ vars.UPSTREAM_URL }}"
          if [ -z "$UPSTREAM" ]; then
            echo "⚠️  UPSTREAM_URL variable not set — skipping sync"
            exit 0
          fi
          git remote add upstream "$UPSTREAM" || git remote set-url upstream "$UPSTREAM"

      - name: Fetch upstream
        run: git fetch upstream --no-tags

      - name: Check for new commits
        id: check
        run: |
          UPSTREAM_BRANCH="${{ vars.UPSTREAM_BRANCH || 'main' }}"
          BEHIND=$(git rev-list HEAD..upstream/$UPSTREAM_BRANCH --count 2>/dev/null || echo "0")
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "upstream_branch=$UPSTREAM_BRANCH" >> $GITHUB_OUTPUT

      - name: Create sync PR if upstream has new commits
        if: steps.check.outputs.behind != '0'
        run: |
          UPSTREAM_BRANCH="${{ steps.check.outputs.upstream_branch }}"
          SYNC_BRANCH="chore/sync-upstream-$(date +%Y%m%d)"
          BEHIND="${{ steps.check.outputs.behind }}"

          git checkout -b "$SYNC_BRANCH"
          git merge "upstream/$UPSTREAM_BRANCH" --no-edit --allow-unrelated-histories || {
            echo "⚠️  Merge conflict detected — creating PR for manual resolution"
            git merge --abort || true
            git checkout "$SYNC_BRANCH" 2>/dev/null || true
          }

          git push origin "$SYNC_BRANCH" --force-with-lease

          gh pr create \
            --title "chore: sync with upstream ($BEHIND new commits)" \
            --body "$(cat <<'EOF'
## Upstream Sync

This PR was automatically created by the **Sync with Upstream** workflow.

| Field | Value |
|-------|-------|
| Upstream | \`${{ vars.UPSTREAM_URL }}\` |
| Commits behind | **$BEHIND** |
| Sync branch | \`$UPSTREAM_BRANCH\` |

### Review Checklist
- [ ] Review upstream changes — check for breaking changes
- [ ] Verify our custom modifications still apply cleanly
- [ ] Merge if all checks pass

If there are conflicts, resolve them in this branch then merge.
EOF
)" \
            --base main \
            --head "$SYNC_BRANCH" \
            --label "upstream-sync" 2>/dev/null || echo "PR already exists or no changes to push"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No sync needed
        if: steps.check.outputs.behind == '0'
        run: echo "✅ Already up to date with upstream."

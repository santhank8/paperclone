name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "I want agents to automatically escalate blocked tasks to their manager in the org chart, so nothing stalls silently..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? Include specific files, config changes, or behavior if you have ideas.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you've thought about.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Agents / adapters
        - Tasks / tickets
        - Org chart / roles
        - Governance / approvals
        - Heartbeats / scheduling
        - Budgets / cost control
        - Dashboard UI
        - CLI
        - API / server
        - Database / migrations
        - Setup / installation
        - Other
    validations:
      required: true

services:
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      # Global API keys — used as fallback for all codex_local / claude_local agents that
      # don't override the key in their own adapter config. An empty value is treated as
      # "not set" by the billing detection logic, so leaving these blank is safe.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      # S3 storage + agent runtime sync (optional — leave blank to use local disk)
      PAPERCLIP_STORAGE_PROVIDER: "${PAPERCLIP_STORAGE_PROVIDER:-local_disk}"
      PAPERCLIP_STORAGE_S3_BUCKET: "${PAPERCLIP_STORAGE_S3_BUCKET:-}"
      PAPERCLIP_STORAGE_S3_REGION: "${PAPERCLIP_STORAGE_S3_REGION:-us-east-1}"
      PAPERCLIP_STORAGE_S3_ENDPOINT: "${PAPERCLIP_STORAGE_S3_ENDPOINT:-}"
      PAPERCLIP_STORAGE_S3_PREFIX: "${PAPERCLIP_STORAGE_S3_PREFIX:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      PAPERCLIP_AGENT_RUNTIME_SYNC_INTERVAL_MS: "${PAPERCLIP_AGENT_RUNTIME_SYNC_INTERVAL_MS:-300000}"
      PAPERCLIP_AGENT_RUNTIME_DIR: "${PAPERCLIP_AGENT_RUNTIME_DIR:-/paperclip/agent-home}"
    stop_grace_period: 120s
    volumes:
      - "${PAPERCLIP_DATA_DIR:-./data/docker-paperclip}:/paperclip"
      - "${CALENBOOK_DIR:-./data/calenbook}:/workspace/calenbook"
      - "${PAPERCLIP_AGENTS_DIR:-./agents}:/paperclip-agents:ro"

services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip_password
      POSTGRES_DB: paperclip
    volumes:
      - paperclip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip"]
      interval: 5s
      timeout: 5s
      retries: 5

  paperclip:
    build: .
    image: paperclip-local
    restart: always
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip_password@db:5432/paperclip
      BETTER_AUTH_SECRET: paperclip_auth_secret_change_me
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      SERVE_UI: "true"
      HOST: "0.0.0.0"
      PORT: "3100"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - paperclip_app_data:/paperclip

volumes:
  paperclip_db_data:
  paperclip_app_data:

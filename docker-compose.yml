services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ironworks
      POSTGRES_PASSWORD: ironworks
      POSTGRES_DB: ironworks
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironworks -d ironworks"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://ironworks:ironworks@db:5432/ironworks
      PORT: "3100"
      SERVE_UI: "true"
      IRONWORKS_DEPLOYMENT_MODE: "authenticated"
      IRONWORKS_DEPLOYMENT_EXPOSURE: "private"
      IRONWORKS_PUBLIC_URL: "${IRONWORKS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      # LLM Provider API keys - pass through from host .env so adapters can use them
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
    volumes:
      - ironworks-data:/ironworks
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  ironworks-data:

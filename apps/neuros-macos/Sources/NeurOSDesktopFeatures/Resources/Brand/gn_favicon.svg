<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>GoldNeuron Favicon</title>
  <defs>
      <filter id="node-glow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="2.5" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
      <filter id="strong-glow" x="-150%" y="-150%" width="400%" height="400%">
        <feGaussianBlur stdDeviation="6" result="blur" />
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FDB931"/>
        <stop offset="100%" stop-color="#E5B143"/>
      </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="#0B0E14" />
  <circle cx="100" cy="100" r="90" fill="#121620" fill-opacity="0.2" />
  <circle cx="100" cy="100" r="40" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" stroke-opacity="0.5" filter="url(#node-glow)" />
  <circle cx="100" cy="100" r="40" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8" />
  <path d="M 90 80 C 80 65 60 70 66 79 C 55 90 55 110 63 115 C 70 125 90 100 90 80 C 90 110 90 130 95 140 C 75 145 90 125 105 115 C 105 100 105 85 105 75 C 110 60 120 70 128 72 C 135 80 145 85 139 91 C 135 100 145 105 140 105" 
        fill="none" stroke="url(#gold-grad)" stroke-width="1.2" filter="url(#node-glow)" />
  <path d="M 90 80 C 80 65 60 70 66 79 C 55 90 55 110 63 115 C 70 125 90 100 90 80 C 90 110 90 130 95 140 C 75 145 90 125 105 115 C 105 100 105 85 105 75 C 110 60 120 70 128 72 C 135 80 145 85 139 91 C 135 100 145 105 140 105" 
        fill="none" stroke="#FFFFFF" stroke-width="0.6" />
  <circle cx="66" cy="79" r="6" fill="#FDB931" filter="url(#node-glow)" />
  <circle cx="128" cy="72" r="4" fill="#FFFFFF" filter="url(#node-glow)" />
  <circle cx="140" cy="105" r="5" fill="#FDB931" filter="url(#node-glow)" />
  <circle cx="63" cy="115" r="4.5" fill="#FFFFFF" filter="url(#node-glow)" opacity="0.9" />
  <circle cx="95" cy="140" r="3.5" fill="#FDB931" filter="url(#node-glow)" />
  <circle cx="139" cy="91" r="2.5" fill="#FFFFFF" filter="url(#node-glow)" opacity="0.6" />
  <circle cx="100" cy="100" r="3" fill="#FFFFFF" filter="url(#strong-glow)" />
</svg>
